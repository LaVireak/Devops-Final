# ─── Server ───────────────────────────────────────────────
server.port=8080

# ─── DataSource (MySQL) ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/idcard_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sadimon_99
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── Thymeleaf ────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ─── File Upload ──────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── App Custom Properties ────────────────────────────────
app.photo-dir=./uploads/photos
app.base-url=http://localhost:8080

# ─── Logging ──────────────────────────────────────────────
logging.level.net.orderzone=DEBUG
logging.level.org.hibernate.SQL=DEBUG
