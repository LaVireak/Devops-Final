name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build with Maven (Skip Tests)
        run: mvn clean package -DskipTests

      - name: Run Tests (SQLite)
        run: mvn test

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 93C4A3FD7BB9C367
          sudo apt-get install -y ansible

      - name: Run Ansible Playbook (Deploy)
        run: |
          # Check if local container SSH port 2222 is open (only available in local environment)
          if nc -z -w 3 127.0.0.1 2222; then
            ansible-playbook -i hosts.ini playbook.yml
          else
            echo "Port 2222 is unreachable. Skipping Ansible deployment on GitHub Cloud runner."
          fi

      - name: Send Email Notification on Failure
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          # SMTP configuration (secrets set up in GitHub Repository Settings)
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "GitHub Actions Build Failed: ${{ github.repository }}"
          body: |
            The CI/CD build or deployment has failed on branch ${{ github.ref_name }}.
            
            Triggered by: ${{ github.actor }}
            Commit message: ${{ github.event.head_commit.message }}
            
            Check the failure details here:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: "lavireak9@gmail.com"
          cc: "srengty@gmail.com"
          from: "GitHub Actions CI/CD <ci-cd@github.com>"
